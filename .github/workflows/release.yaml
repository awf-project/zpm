name: Release

env:
  ZIG_VERSION: "0.15.2"

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Check Zig formatting
        run: zig fmt --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Run tests
        run: zig build test

  build-linux:
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - target: linux-x86_64
            zig_target: x86_64-linux-gnu
          - target: linux-arm64
            zig_target: aarch64-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install ARM64 cross-compilation toolchain
        if: matrix.target == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          ZIG_TARGET: ${{ matrix.zig_target }}
        run: zig build -Doptimize=ReleaseSafe -Dtarget=$ZIG_TARGET

      - name: Stage artifact
        env:
          TARGET: ${{ matrix.target }}
        run: mv zig-out/bin/zpm "zig-out/bin/zpm-$TARGET"

      - uses: actions/upload-artifact@v4
        with:
          name: zpm-${{ matrix.target }}
          path: zig-out/bin/zpm-${{ matrix.target }}

  build-darwin-universal:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install llvm-lipo
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm

      - name: Build aarch64-macos
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos
          mv zig-out/bin/zpm zpm-arm64

      - name: Build x86_64-macos
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-macos
          mv zig-out/bin/zpm zpm-x86_64

      - name: Fuse into universal binary
        run: |
          # On Ubuntu the llvm package ships tools as `llvm-lipo-<version>`;
          # resolve whichever version is present.
          LIPO="$(command -v llvm-lipo || ls /usr/bin/llvm-lipo-* 2>/dev/null | sort -V | tail -1)"
          [ -n "$LIPO" ] || { echo "llvm-lipo not found" >&2; exit 1; }
          "$LIPO" -create zpm-arm64 zpm-x86_64 -output zpm-darwin-universal

      - uses: actions/upload-artifact@v4
        with:
          name: zpm-darwin-universal
          path: zpm-darwin-universal

  release:
    needs: [build-linux, build-darwin-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: zpm-*
          merge-multiple: true
          path: artifacts

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum zpm-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES="$(git tag -l --format='%(contents)' "$TAG")"
          if [ -n "$NOTES" ]; then
            gh release create "$TAG" --title "$TAG" --notes "$NOTES" artifacts/*
          else
            gh release create "$TAG" --title "$TAG" --generate-notes artifacts/*
          fi

  dev-release:
    needs: [build-linux, build-darwin-universal]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: zpm-*
          merge-multiple: true
          path: artifacts

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum zpm-* > SHA256SUMS

      - name: Create dev pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          TAG="dev-${SHA::7}"
          gh release create "$TAG" \
            --title "$TAG" \
            --prerelease \
            --notes "Dev build from commit $SHA" \
            artifacts/*

      - name: Cleanup old dev releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("dev-")))] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag || true
            done
