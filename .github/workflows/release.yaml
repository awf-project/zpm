name: Release

env:
  ZIG_VERSION: "0.15.2"

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Zig formatting
        run: zig fmt --check .

      - name: Check Rust formatting
        run: cargo fmt --check
        working-directory: ffi/zpm-prolog-ffi

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: ffi/zpm-prolog-ffi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: zig build test

  build:
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: linux-arm64
            zig_target: aarch64-linux-gnu
            rust_target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: darwin-x86_64
            zig_target: x86_64-macos
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            target: darwin-arm64
            zig_target: aarch64-macos
            rust_target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install ARM64 cross-compilation toolchain
        if: matrix.target == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          ZIG_TARGET: ${{ matrix.zig_target }}
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: zig build -Doptimize=ReleaseSafe -Dtarget=$ZIG_TARGET

      - name: Stage artifact
        env:
          TARGET: ${{ matrix.target }}
        run: mv zig-out/bin/zpm "zig-out/bin/zpm-$TARGET"

      - uses: actions/upload-artifact@v4
        with:
          name: zpm-${{ matrix.target }}
          path: zig-out/bin/zpm-${{ matrix.target }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: zpm-*
          merge-multiple: true
          path: artifacts

      - name: Generate SHA256SUMS
        run: sha256sum artifacts/zpm-* > artifacts/SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES="$(git tag -l --format='%(contents)' "$TAG")"
          if [ -n "$NOTES" ]; then
            gh release create "$TAG" --title "$TAG" --notes "$NOTES" artifacts/*
          else
            gh release create "$TAG" --title "$TAG" --generate-notes artifacts/*
          fi

  dev-release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: zpm-*
          merge-multiple: true
          path: artifacts

      - name: Generate SHA256SUMS
        run: sha256sum artifacts/zpm-* > artifacts/SHA256SUMS

      - name: Create dev pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          TAG="dev-${SHA::7}"
          gh release create "$TAG" \
            --title "$TAG" \
            --prerelease \
            --notes "Dev build from commit $SHA" \
            artifacts/*

      - name: Cleanup old dev releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("dev-")))] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag || true
            done
