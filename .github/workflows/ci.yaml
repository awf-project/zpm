# GitHub Actions CI for Zig + Rust FFI project

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Zig formatting
        run: zig fmt --check .

      - name: Check Rust formatting
        run: cargo fmt --check
        working-directory: ffi/zpm-prolog-ffi

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: ffi/zpm-prolog-ffi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: zig build test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - uses: actions/upload-artifact@v4
        with:
          name: binary
          path: zig-out/bin/
